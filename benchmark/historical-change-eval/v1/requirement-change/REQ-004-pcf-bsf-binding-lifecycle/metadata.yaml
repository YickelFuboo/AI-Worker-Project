commit_message: "feat(PCF): Integrate BSF client for binding management\n\n• Add BSF\
  \ service client for PCF binding lifecycle:\n  - Create bsf_service.go with CreatePCFBinding,\
  \ DeletePCFBinding functions\n  - Integrate BSF client into consumer.go for binding\
  \ operations\n  - Add BSF service configuration and discovery support\n\n• Enhance\
  \ UE context management:\n  - Update ue.go with BSF binding ID tracking\n  - Integrate\
  \ binding creation/deletion in SM policy lifecycle\n  - Add proper cleanup of BSF\
  \ bindings on session termination\n\n• Update SM policy processor:\n  - Modify smpolicy.go\
  \ to use BSF for binding management\n  - Add BSF binding creation during policy\
  \ establishment\n  - Ensure proper binding cleanup on policy deletion\n\nThis integration\
  \ enables PCF to properly manage bindings with BSF\naccording to 3GPP TS 29.521\
  \ specifications for enhanced policy control."
