commit_message: 'feat: include UE location info in SM Policy Association Create request


  Include UserLocationInfo in the SmPolicyContextData sent to PCF during

  SM Policy Association Create (N7 interface, Npcf_SMPolicyControl).

  This allows the PCF to apply location-based policies at session

  establishment.'
