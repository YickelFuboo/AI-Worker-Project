commit_message: "feat(SMF): Integrate BSF client for binding management\n\n• Add BSF\
  \ service client for SM context binding lifecycle:\n  - Create bsf_service.go with\
  \ CreatePCFBinding, DeletePCFBinding functions\n  - Integrate BSF client into consumer.go\
  \ for binding operations\n  - Add BSF service configuration and discovery support\n\
  \n• Enhance SM context management:\n  - Update sm_context.go with BSF binding ID\
  \ tracking\n  - Integrate binding creation/deletion in PDU session lifecycle\n \
  \ - Add proper cleanup of BSF bindings on session termination\n\n• Update PDU session\
  \ processor:\n  - Modify pdu_session.go to use BSF for binding management\n  - Add\
  \ BSF binding creation during session establishment\n  - Ensure proper binding cleanup\
  \ on session release\n\nThis integration enables SMF to properly manage bindings\
  \ with BSF\naccording to 3GPP TS 29.521 specifications for enhanced session management."
