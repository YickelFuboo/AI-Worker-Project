# 5GC 特性树 (Features Tree)
# ============================================================================
# 用途：5GC 全量"特性"索引框架，作为后续反向生成详细特性文档的骨架。
#      每个特性含 id(稳定标识)、name、brief(一句话描述)、releases(引入版本)、ref(3GPP引用)、status。
#
# 严格区分原则：
#   - 仅收录 3GPP 意义上的"特性"(feature)——可被运营商选择性部署的能力
#   - 不收录"架构原则"(SBA / CP-UP 分离 / NF Set 等)——这些是系统设计，不是可选特性
#   - 不收录"基础流程"(initial registration / PDU session establishment / handover 等)
#     ——这些是 5GC 基础运行机制，规范在 TS 23.502 流程章节
#   - 不收录"基础机制"(5G-AKA / NAS 加密 / 5QI / GBR / Session-AMBR / 地址分配等)
#     ——这些是特性下的实现细节，不独立成特性
#
# 版本基线：3GPP Release 15–18
# 来源：
#   - free5GC features: https://free5gc.org/guide/features/
#   - 3GPP TS 23.501 (System architecture): Rel-15/16/17/18
#   - 3GPP TS 23.502 (Procedures): Rel-15/16/17/18
#   - 3GPP TS 23.503 (PCC): Rel-15/16/17/18
#   - NTT DOCOMO Rel-17/18 Core overview: technical_journal vol24_3, vol26_3
#   - 3GPP Release 16/17/18 features pages: 3gpp.org/specifications-technologies/releases
#
# 维护约定：
#   - id 用 snake_case，按 类别前缀_特性名 命名，稳定不变
#   - releases 列出引入版本及后续增强版本，例 [R15, R16] 表示 R15 引入、R16 增强
#   - ref 留空表示纯 free5GC 工程实现特性，无 3GPP 对应条款
#   - status: implemented=free5GC当前实现, partial=部分实现, planned=未实现
# ============================================================================

meta:
  version: "2.0"
  last_updated: "2026-06-21"
  total_features: 112
  categories: 18
  scope: "严格特性 (3GPP feature)，排除架构原则/基础流程/基础机制"

# ============================================================================
# 特性按类别分组。每个特性是一个独立条目，便于后续按 id 拆解详细文档。
# ============================================================================
features:

  # --------------------------------------------------------------------------
  # 1. 漫游与跨域通信 (Roaming & Cross-Domain)
  # --------------------------------------------------------------------------
  - category: 漫游与跨域通信
    items:
      - id: roaming_home_routed_local_breakout
        name: Roaming (Home-Routed & Local Breakout)
        brief: hPLMN 与 vPLMN 各部署 NF，支持两种漫游路由模式
        releases: [R15]
        ref: "TS 23.501 §5.16"
        status: partial

      - id: roaming_sepp
        name: Security Edge Protection Proxy (SEPP)
        brief: 跨 PLMN SBI 通信的安全边界代理
        releases: [R15]
        ref: "TS 23.501 §6.2.13B, TS 29.500"
        status: planned

      - id: roaming_scp
        name: Service Communication Proxy (SCP) — Indirect/Delegated
        brief: SBI 通信代理，支持 indirect/delegated 通信模式
        releases: [R15]
        ref: "TS 23.501 §6.2.13A, TS 29.500"
        status: planned

      - id: roaming_home_routing_security
