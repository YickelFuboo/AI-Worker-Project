# 本文件是工作空间级跨仓元素图谱，由 rev-arch-element-extract skill 维护。
# 每个元素对应一个 repo（一 repo 一顶层元素）。
# 详细元素规格见 elements/{element_name}/spec.md。
#
# depends_on / depended_by 仅记录"本系统内 NF 元素"之间的边；
# 外部基础设施（MongoDB / Prometheus / OpenTelemetry / Linux kernel xfrm / gtp5g）、
# 接入设备（UE / RAN / WiFi AP / TWAN AP）、外部域（AF / SCS-AS / billing_domain DN）
# 等不属于 NF 元素的依赖，仅出现在各 element 目录下 dependencies.yaml 的 external_dependencies 节，
# 不纳入本树。

