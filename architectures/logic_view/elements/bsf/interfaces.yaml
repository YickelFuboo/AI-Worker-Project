  - if_id: IF-011
    if_name: GetPCFMbsBinding
    protocol: SBI (Nbsf_Management)
    direction: provided
    summary: 按 MBS Session ID 查询 PCF MBS 绑定
    contract_ref: repos/bsf/.agent/interfaces.md §2.12

  - if_id: IF-012
    if_name: ModifyIndPCFMbsBinding
    protocol: SBI (Nbsf_Management)
