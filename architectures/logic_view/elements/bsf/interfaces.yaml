  - if_id: IF-013
    if_name: DeleteIndPCFMbsBinding
    protocol: SBI (Nbsf_Management)
    direction: provided
    summary: 删除 MBS 绑定
    contract_ref: repos/bsf/.agent/interfaces.md §2.14

