  - if_id: IF-014
    if_name: CreateIndividualSubcription
    protocol: SBI (Nbsf_Management)
    direction: provided
    summary: 创建绑定事件订阅
    contract_ref: repos/bsf/.agent/interfaces.md §2.15

  - if_id: IF-015
    if_name: ReplaceIndividualSubcription
    protocol: SBI (Nbsf_Management)
    direction: provided
