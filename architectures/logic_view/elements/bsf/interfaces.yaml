    contract_ref: repos/bsf/.agent/interfaces.md §2.16

  - if_id: IF-016
    if_name: DeleteIndividualSubcription
    protocol: SBI (Nbsf_Management)
    direction: provided
    summary: 删除订阅
    contract_ref: repos/bsf/.agent/interfaces.md §2.17

  # 健康检查
  - if_id: IF-017
    if_name: Index
    protocol: HTTP
    direction: provided
    summary: 根路径健康检查
    contract_ref: repos/bsf/.agent/interfaces.md §2.1

