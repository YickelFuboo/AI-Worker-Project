    contract_ref: repos/udr/.agent/interfaces.md §2.8

  - if_id: IF-016
    if_name: Nhss_IMS_SDM
    protocol: SBI (Nhss_IMS_SDM)
    direction: provided
    summary: HSS IMS SDM 数据查询/订阅（架构占位，未实现）
    contract_ref: repos/udr/.agent/interfaces.md §2.9

  # Metrics
  - if_id: IF-017
    if_name: Metrics Scrape
    protocol: HTTP scrape (Prometheus)
    direction: provided
    summary: 指标暴露（独立 metrics server 端口，默认 9091）
    contract_ref: repos/udr/.agent/spec.md §2.1

