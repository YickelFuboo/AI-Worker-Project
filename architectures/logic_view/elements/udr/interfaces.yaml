# 本文件是 udr 元素对外提供的接口索引（摘要层）。
# 完整契约（method/path/请求响应模型/错误码）见 repos/udr/.agent/interfaces.md。
# 接口 ID 与 spec.md §5 一一对应。

provided_interfaces:
  # Nudr_DataRepository 服务组 - Subscription Data
  - if_id: IF-001
    if_name: Nudr_DR Subscription Data
    protocol: SBI (Nudr_DataRepository, HTTP/2 + JSON + TLS)
    direction: provided
    summary: UE 订阅档案 CRUD（AM/SM/SMS Management/Trace/Operator Specific/Identity 等子集合）
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  - if_id: IF-002
    if_name: Nudr_DR AMF Context
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: AMF 3GPP / Non-3GPP 接入登记上下文 PUT/PATCH/GET
    contract_ref: repos/udr/.agent/interfaces.md §2.2 §2.3

  - if_id: IF-003
    if_name: Nudr_DR SMF Registration
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: SMF 登记上下文集合与单文档 CRUD
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  - if_id: IF-004
    if_name: Nudr_DR SMSF Registration
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 3GPP/Non-3GPP SMSF 登记上下文 CRUD
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  - if_id: IF-005
    if_name: Nudr_DR Authentication Data
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 鉴权数据查询/更新、Authentication Status、Auth SoR
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  # Policy Data 服务组
  - if_id: IF-006
    if_name: Nudr_DR Policy Data
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 策略数据 CRUD（UE/AM/SM/BDT/Sponsor Connectivity/Plmn UE Policy 等）
    contract_ref: repos/udr/.agent/interfaces.md §2.2 §2.6

  # Application Data 服务组
  - if_id: IF-007
    if_name: Nudr_DR Application Data
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 应用数据 CRUD（PFD/Influence Data/BDT/Service Parameter/IPTV）
    contract_ref: repos/udr/.agent/interfaces.md §2.3 §2.4

  # Exposure Data 服务组
  - if_id: IF-008
    if_name: Nudr_DR Exposure Data
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: EE 订阅集合与单文档、AMF Subscription Info、组订阅
