  - if_id: IF-009
    if_name: Nudr_DR SDM Subscription
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: Subscriber Data Management 订阅集合与文档
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  # Subs-to-Notify
  - if_id: IF-010
    if_name: Nudr_DR Subs-to-Notify
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 数据变更订阅注册（POST/PUT/DELETE）
    contract_ref: repos/udr/.agent/interfaces.md §2.5

  # Shared Data
  - if_id: IF-011
    if_name: Nudr_DR Shared Data
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 共享数据检索（GET）
    contract_ref: repos/udr/.agent/interfaces.md §2.10

  - if_id: IF-012
    if_name: Nudr_DR Parameter Provision
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 参数提供文档 CRUD（Provisioned Parameter Data）
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  - if_id: IF-013
    if_name: Nudr_DR Identity/ODB Query
    protocol: SBI (Nudr_DataRepository)
    direction: provided
    summary: 按 SUPI/GPSI 查询身份与 ODB 数据
    contract_ref: repos/udr/.agent/interfaces.md §2.1

  # 主动外呼回调
  - if_id: IF-014
    if_name: Data Change Notification
    protocol: HTTP-Callback (UDR -> 订阅方 notification URI)
    direction: outbound
    summary: 数据变更时异步向订阅方推送 Data Change / Policy Data Change / Influence Data Change 通知
    contract_ref: repos/udr/.agent/interfaces.md §2.5

  # 架构占位接口（未实现，返回 501）
  - if_id: IF-015
    if_name: Nudr_GroupId-Map
    protocol: SBI (Nudr_GroupId-Map)
    direction: provided
