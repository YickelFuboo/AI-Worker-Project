  - if_id: IF-005
    if_name: PFDFSubscriptions
    protocol: SBI REST (Nnef_PFDmanagement)
    direction: provided
    summary: SMF 订阅 PFD 变更（POST /nnef-pfdmanagement/v1/subscriptions，DELETE /.../:subID）
    contract_ref: repos/nef/.agent/interfaces.md §2.19-§2.20

  # SBI 侧 Callback（Nnef_EventExposure）
  - if_id: IF-006
    if_name: SmfNotificationCallback
    protocol: SBI REST (nnef-callback, HTTP/2 + JSON)
    direction: provided
    summary: SMF 事件通知入口，按 NotifId 路由并转发至 AF NotificationDestination
    contract_ref: repos/nef/.agent/interfaces.md §2.21

