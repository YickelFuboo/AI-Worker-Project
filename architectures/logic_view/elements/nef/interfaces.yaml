provided_interfaces:
  # AF 侧 REST API（3gpp-traffic-influence, TS 29.522）
  - if_id: IF-001
    if_name: TrafficInfluenceSubscription
    protocol: AF REST (3gpp-traffic-influence, HTTP/2 + JSON, TS 29.522)
    direction: provided
    summary: AF 流量影响订阅的 CRUD 入口（GET/POST/PUT/PATCH/DELETE on /3gpp-traffic-influence/v1/:afID/subscriptions[/:subID]）
    contract_ref: repos/nef/.agent/interfaces.md §2.1-§2.6

  # AF 侧 REST API（3gpp-pfd-management, TS 29.122）
  - if_id: IF-002
    if_name: PFDManagementTransactions
    protocol: AF REST (3gpp-pfd-management, TS 29.122)
    direction: provided
    summary: SCS/AS PFD 事务 CRUD（GET/POST/DELETE on /3gpp-pfd-management/v1/:scsAsID/transactions[/:transID]）
    contract_ref: repos/nef/.agent/interfaces.md §2.7-§2.12

  - if_id: IF-003
    if_name: PFDManagementApplications
    protocol: AF REST (3gpp-pfd-management)
    direction: provided
    summary: SCS/AS PFD 应用粒度 CRUD（GET/PUT/PATCH/DELETE on .../transactions/:transID/applications/:appID）
    contract_ref: repos/nef/.agent/interfaces.md §2.13-§2.16

  # SBI 侧（Nnef_PFDmanagement）
  - if_id: IF-004
    if_name: PFDFApplicationsQuery
    protocol: SBI REST (Nnef_PFDmanagement, HTTP/2 + JSON + mTLS)
