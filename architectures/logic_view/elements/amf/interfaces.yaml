# 本文件是 amf 元素对外提供的接口索引（摘要层）。
# 完整契约（method/path/请求响应模型/错误码）见 repos/amf/.agent/interfaces.md。
# 接口 ID 与 spec.md §5 一一对应。
# 协议分为三类：
#   - SBI (Namf_*)：HTTP/2 + JSON + mTLS，3GPP TS 29.518
#   - HTTP-Callback (Namf_Communication callback)：被其他 NF 回调，独立 OAuth2 鉴权
#   - 协议层接口（NGAP over SCTP、NAS over N1）：非 REST，列在 spec.md §5 与 §6 中

provided_interfaces:
  # ===== Namf_Communication 服务组（namf-comm）=====
  - if_id: IF-001
    if_name: UEContextTransfer
    protocol: SBI (Namf_Communication, HTTP/2 + JSON + mTLS)
    direction: provided
    summary: UE 上下文转移（跨 AMF 切换时被目标 AMF 调用）
    contract_ref: repos/amf/.agent/interfaces.md §2.1.1

  - if_id: IF-002
    if_name: CreateUEContext
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 创建 UE 上下文（目标 AMF 侧）
    contract_ref: repos/amf/.agent/interfaces.md §2.1.2

  - if_id: IF-003
    if_name: ReleaseUEContext
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 释放 UE 上下文
    contract_ref: repos/amf/.agent/interfaces.md §2.1.3

  - if_id: IF-004
    if_name: RegistrationStatusUpdate
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 更新注册状态（向旧 AMF 同步）
    contract_ref: repos/amf/.agent/interfaces.md §2.1.4

  - if_id: IF-005
    if_name: N1N2MessageTransfer
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: N1/N2 消息转移（其他 NF 调用 AMF 转发至 UE/RAN）
    contract_ref: repos/amf/.agent/interfaces.md §2.1.8

  - if_id: IF-006
    if_name: AMFStatusChangeSubscribe
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 订阅 AMF 状态变更
    contract_ref: repos/amf/.agent/interfaces.md §2.1.15

  - if_id: IF-007
    if_name: AMFStatusChangeSubscribeModify
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 修改 AMF 状态变更订阅
    contract_ref: repos/amf/.agent/interfaces.md §2.1.16

  - if_id: IF-008
    if_name: AMFStatusChangeUnSubscribe
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: 取消 AMF 状态变更订阅
    contract_ref: repos/amf/.agent/interfaces.md §2.1.17

  - if_id: IF-009
    if_name: EBIAssignment
    protocol: SBI (Namf_Communication)
    direction: provided
    summary: EPS Bearer ID 分配
    contract_ref: repos/amf/.agent/interfaces.md §2.1.7

  # ===== Namf_EventExposure 服务组（namf-evts）=====
  - if_id: IF-010
    if_name: EventExposureCreateSubscription
    protocol: SBI (Namf_EventExposure)
    direction: provided
    summary: 创建事件暴露订阅（UE 注册、可达性、位置等）
    contract_ref: repos/amf/.agent/interfaces.md §2.2.1

  # ===== Namf_MT 服务组（namf-mt）=====
  - if_id: IF-011
    if_name: MT-EnableUeReachability
    protocol: SBI (Namf_MT)
    direction: provided
    summary: 使能 UE 可达性（触发寻呼流程）
    contract_ref: repos/amf/.agent/interfaces.md §2.3.2

  # ===== Namf_Location 服务组（namf-loc）=====
  - if_id: IF-012
    if_name: Location-ProvideLocationInfo
    protocol: SBI (Namf_Location)
    direction: provided
    summary: 向 LCS/GMLC/LMF 提供 UE 位置信息
    contract_ref: repos/amf/.agent/interfaces.md §2.4.1

  # ===== Namf_MBSBroadcast 服务组（namf-mbsbroadcast）=====
  - if_id: IF-013
    if_name: MBSBroadcast-Context
    protocol: SBI (Namf_MBSBroadcast)
    direction: provided
    summary: 多播广播会话上下文创建/更新/释放
    contract_ref: repos/amf/.agent/interfaces.md §2.5.1

  # ===== Namf_MBSCommunication 服务组（namf-mbscommunication）=====
  - if_id: IF-014
    if_name: MBSCommunication-N2MessageTransfer
    protocol: SBI (Namf_MBSCommunication)
    direction: provided
    summary: MBS N2 消息转移
    contract_ref: repos/amf/.agent/interfaces.md §2.6.1

  # ===== Namf_OAM 服务组（namf-oam）=====
  - if_id: IF-015
    if_name: OAM-RegisteredUEContext
    protocol: SBI (Namf_OAM)
    direction: provided
    summary: 运维查询已注册 UE 上下文
    contract_ref: repos/amf/.agent/interfaces.md §2.7.1

  # ===== HTTP-Callback 服务组（namf-callback，供 PCF/SMF/UDM 回调）=====
  - if_id: IF-016
    if_name: AmPolicyControlUpdateNotify
    protocol: HTTP-Callback (Namf_Communication callback)
    direction: provided
    summary: AM 策略更新通知回调（PCF 调用）
    contract_ref: repos/amf/.agent/interfaces.md §2.8.1

  - if_id: IF-017
    if_name: SmContextStatusNotify
    protocol: HTTP-Callback (Namf_Communication callback)
    direction: provided
    summary: SM 上下文状态通知回调（SMF 调用）
    contract_ref: repos/amf/.agent/interfaces.md §2.8.3

  - if_id: IF-018
    if_name: N1MessageNotify
    protocol: HTTP-Callback (Namf_Communication callback)
    direction: provided
    summary: N1 消息通知回调（SMF 调用）
    contract_ref: repos/amf/.agent/interfaces.md §2.8.4

  - if_id: IF-019
    if_name: DeregistrationNotification
    protocol: HTTP-Callback (Namf_Communication callback)
    direction: provided
    summary: 去注册通知回调（UDM 调用）
    contract_ref: repos/amf/.agent/interfaces.md §2.8.5

  # ===== 协议层接口（非 REST，N1/N2 接入侧）=====
  - if_id: IF-020
    if_name: N2-NGAP
    protocol: NGAP over SCTP (3GPP TS 38.413)
    direction: provided
    summary: 与 RAN(gNB) 的 N2 控制面信令承载入口
    contract_ref: repos/amf/.agent/design.md §8.8

  - if_id: IF-021
    if_name: N1-NAS
    protocol: NAS over N1 (3GPP TS 24.501)
    direction: provided
    summary: 与 UE 的 N1 控制面信令承载入口（经 RAN 透传）
    contract_ref: repos/amf/.agent/design.md §8.7

# 完整 36 项 SBI 接口（含 8 个服务组的全部 method/path）见
# repos/amf/.agent/spec.md §3 与 repos/amf/.agent/interfaces.md §2
